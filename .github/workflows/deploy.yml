name: Deploy to GitHub Pages

# Builds the Vite app and publishes dist/ to GitHub Pages. Requires the
# repo's Settings → Pages → "Build and deployment" source to be set to
# "GitHub Actions" (not "Deploy from a branch" — that older setting just
# serves raw repo files with no build step, which is why the previous
# deployment showed a blank page).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
